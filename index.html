<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Улица Мира, 13 — Depressive Walk</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:#000; overflow:hidden; font-family:'Courier New',monospace; }
    #ui { position:absolute; top:20px; left:20px; color:#ccc; font-size:18px; text-shadow:0 0 8px black; pointer-events:none; z-index:10; }
    #msg { position:absolute; bottom:80px; left:50%; transform:translateX(-50%); background:rgba(0,0,0,0.8); color:white; padding:10px 24px; border-radius:30px; font-size:16px; opacity:0; transition:0.3s; pointer-events:none; z-index:10; }
    #mobile-controls { position:absolute; bottom:20px; left:0; right:0; display:none; justify-content:center; gap:12px; z-index:10; flex-wrap:wrap; }
    .ctrl-btn { width:50px; height:50px; border-radius:25px; background:rgba(255,255,255,0.1); backdrop-filter:blur(12px); border:1px solid rgba(255,255,255,0.25); color:white; font-size:24px; display:flex; align-items:center; justify-content:center; user-select:none; -webkit-user-select:none; touch-action:none; }
    @media (pointer:coarse) { #mobile-controls { display:flex; } }
  </style>
  <!-- PWA Manifest -->
  <link rel="manifest" href="data:application/manifest+json,{name:'Улица Мира',short_name:'Мира',start_url:'.',display:'standalone',background_color:'#000',theme_color:'#000',icons:[{src:'data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAACAAAAAgCAYAAABzenr0AAAAAXNSR0IArs4c6QAAAMhJREFUWEft1rENwjAQBdD/F0jJGAFJyMzClDQZWCNuwAhUjAAjYAXCvYOdCHyylAsufsn9/bv/l0p8UuBwgQ0NPMBOBc5Q1iMEqHMdk2q+BgggUQHrPoFYJOA7UPaXQ/AQj2q6AM+RAI9y1QWAABUwG0AiJVR7gQoOkQCMygVEC4xMcyIP8IgGTKjF7wKERgG5CJAcCWIGMEVq/D4g0QGiBfj3A6wOWO8D7J0Yd/vAAuw8AAAAAA+gnwABkYCGFAgFfAAAAAElFTkSuQmCC',sizes:'32x32',type:'image/png'}]}">
</head>
<body>
  <div id="ui">🏚️ Улица Мира, 13</div>
  <div id="msg">Нажмите на экран, чтобы начать</div>
  <div id="mobile-controls">
    <button class="ctrl-btn" id="btn-left">←</button>
    <button class="ctrl-btn" id="btn-forward">↑</button>
    <button class="ctrl-btn" id="btn-right">→</button>
    <button class="ctrl-btn" id="btn-back">↓</button>
  </div>

  <script type="importmap">
    { "imports": { "three": "https://unpkg.com/three@0.157.0/build/three.module.js", "three/addons/": "https://unpkg.com/three@0.157.0/examples/jsm/" } }
  </script>

  <script type="module">
    import * as THREE from 'three';
    import { PointerLockControls } from 'three/addons/controls/PointerLockControls.js';

    // ==================== АУДИО ====================
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    function resumeAudio() { if (audioCtx.state === 'suspended') audioCtx.resume(); }
    function beep(freq, type, vol, duration) {
      const osc = audioCtx.createOscillator(), gain = audioCtx.createGain();
      osc.type = type; osc.frequency.value = freq;
      gain.gain.setValueAtTime(vol, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
      osc.connect(gain); gain.connect(audioCtx.destination);
      osc.start(); osc.stop(audioCtx.currentTime + duration);
    }
    function startWind() {
      const bufferSize = 4096, noise = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
      const data = noise.getChannelData(0);
      for (let i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1;
      const source = audioCtx.createBufferSource();
      source.buffer = noise; source.loop = true;
      const filter = audioCtx.createBiquadFilter();
      filter.type = 'lowpass'; filter.frequency.value = 500;
      const gain = audioCtx.createGain();
      gain.gain.value = 0.04;
      source.connect(filter); filter.connect(gain); gain.connect(audioCtx.destination);
      source.start();
    }

    // ==================== ОСНОВНЫЕ ПАРАМЕТРЫ ====================
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x2a2a35);
    scene.fog = new THREE.FogExp2(0x2a2a35, 0.006);

    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 80);
    camera.position.set(0, 1.7, 6);
    camera.rotation.order = 'YXZ';

    const renderer = new THREE.WebGLRenderer({ antialias: false, powerPreference: 'high-performance' });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    document.body.appendChild(renderer.domElement);

    // ==================== УПРАВЛЕНИЕ ====================
    const controls = new PointerLockControls(camera, document.body);
    controls.addEventListener('lock', () => {
      document.getElementById('msg').style.opacity = '0';
      resumeAudio();
    });
    controls.addEventListener('unlock', () => {
      document.getElementById('msg').style.opacity = '1';
    });
    document.body.addEventListener('click', () => { if (!controls.isLocked) controls.lock(); });

    const keyState = {};
    window.addEventListener('keydown', (e) => {
      // поддержка физических клавиш независимо от раскладки
      if (e.code === 'KeyW' || e.code === 'ArrowUp') keyState.forward = true;
      if (e.code === 'KeyS' || e.code === 'ArrowDown') keyState.backward = true;
      if (e.code === 'KeyA' || e.code === 'ArrowLeft') keyState.left = true;
      if (e.code === 'KeyD' || e.code === 'ArrowRight') keyState.right = true;
      if (e.code === 'KeyE') keyState.interact = true;
      e.preventDefault();
    });
    window.addEventListener('keyup', (e) => {
      if (e.code === 'KeyW' || e.code === 'ArrowUp') keyState.forward = false;
      if (e.code === 'KeyS' || e.code === 'ArrowDown') keyState.backward = false;
      if (e.code === 'KeyA' || e.code === 'ArrowLeft') keyState.left = false;
      if (e.code === 'KeyD' || e.code === 'ArrowRight') keyState.right = false;
      if (e.code === 'KeyE') keyState.interact = false;
      e.preventDefault();
    });

    // Мобильные кнопки
    document.getElementById('btn-forward').addEventListener('pointerdown', () => keyState.forward = true);
    document.getElementById('btn-forward').addEventListener('pointerup', () => keyState.forward = false);
    document.getElementById('btn-left').addEventListener('pointerdown', () => keyState.left = true);
    document.getElementById('btn-left').addEventListener('pointerup', () => keyState.left = false);
    document.getElementById('btn-back').addEventListener('pointerdown', () => keyState.backward = true);
    document.getElementById('btn-back').addEventListener('pointerup', () => keyState.backward = false);
    document.getElementById('btn-right').addEventListener('pointerdown', () => keyState.right = true);
    document.getElementById('btn-right').addEventListener('pointerup', () => keyState.right = false);

    // ==================== ТЕКСТУРЫ (процедурный пиксель-арт) ====================
    function createTexture(width, height, draw) {
      const canvas = document.createElement('canvas');
      canvas.width = width; canvas.height = height;
      const ctx = canvas.getContext('2d');
      draw(ctx);
      const tex = new THREE.CanvasTexture(canvas);
      tex.minFilter = THREE.NearestFilter;
      tex.magFilter = THREE.NearestFilter;
      tex.wrapS = THREE.RepeatWrapping;
      tex.wrapT = THREE.RepeatWrapping;
      tex.colorSpace = THREE.SRGBColorSpace;
      return tex;
    }

    // Бетонная панель
    const panelTex = createTexture(128, 128, ctx => {
      ctx.fillStyle = '#808080'; ctx.fillRect(0,0,128,128);
      for (let i=0; i<400; i++) {
        const shade = 100 + Math.random()*60 | 0;
        ctx.fillStyle = `rgb(${shade},${shade},${shade})`;
        ctx.fillRect(Math.random()*128, Math.random()*128, 2, 2);
      }
      // горизонтальные швы
      ctx.fillStyle = '#555'; ctx.fillRect(0,32,128,2); ctx.fillRect(0,64,128,2); ctx.fillRect(0,96,128,2);
      ctx.fillStyle = '#777'; ctx.fillRect(0,33,128,1); ctx.fillRect(0,65,128,1); ctx.fillRect(0,97,128,1);
    });

    // Кирпич
    const brickTex = createTexture(128, 128, ctx => {
      ctx.fillStyle = '#6b4c3b'; ctx.fillRect(0,0,128,128);
      for (let y=0; y<8; y++) {
        const offset = y%2===0 ? 0 : 16;
        for (let x=0; x<8; x++) {
          ctx.fillStyle = Math.random()<0.6 ? '#8b5e4c' : '#5a3a2a';
          ctx.fillRect(x*16+offset+2, y*16+2, 12, 12);
        }
      }
    });

    // Асфальт
    const asphaltTex = createTexture(256, 256, ctx => {
      ctx.fillStyle = '#2a2a2a'; ctx.fillRect(0,0,256,256);
      for (let i=0; i<800; i++) {
        ctx.fillStyle = Math.random()<0.5 ? '#333' : '#1a1a1a';
        ctx.fillRect(Math.random()*256, Math.random()*256, 2, 2);
      }
    });

    // Окно (тёмное, с бликами)
    const windowTex = createTexture(64, 64, ctx => {
      ctx.fillStyle = '#1a1a2e'; ctx.fillRect(0,0,64,64);
      ctx.fillStyle = '#2a2a3e'; ctx.fillRect(4,4,26,26);
      ctx.fillStyle = '#111'; ctx.fillRect(6,6,22,22);
      // блик
      ctx.fillStyle = 'rgba(255,255,255,0.15)';
      ctx.fillRect(8,8,8,4);
    });

    // Дверь подъезда
    const doorTex = createTexture(64, 96, ctx => {
      ctx.fillStyle = '#4a3020'; ctx.fillRect(0,0,64,96);
      ctx.fillStyle = '#2a1a0a'; ctx.fillRect(4,4,56,88);
      ctx.fillStyle = '#5a4030'; ctx.fillRect(8,8,48,80);
      // ручка
      ctx.fillStyle = '#888'; ctx.fillRect(46,44,4,12);
    });

    // Ржавый металл
    const rustTex = createTexture(128, 128, ctx => {
      ctx.fillStyle = '#4a2a1a'; ctx.fillRect(0,0,128,128);
      for (let i=0; i<500; i++) {
        ctx.fillStyle = ['#8b4513','#a0522d','#6b3410'][Math.floor(Math.random()*3)];
        ctx.fillRect(Math.random()*128, Math.random()*128, 1, 1);
      }
    });

    // ==================== ГЕОМЕТРИЯ УРОВНЯ ====================
    const MAP_W = 50, MAP_H = 10;
    const CELL = 1.5;
    // Карта: 0-пусто, 1-стена, 2-дверь подъезда (можно проходить), 3-окно (непроходимо, но для декорации)
    const map = new Uint8Array(MAP_W * MAP_H);
    function setCell(x, z, v) { if (x>=0 && x<MAP_W && z>=0 && z<MAP_H) map[z*MAP_W + x] = v; }
    // Заполняем границы
    for (let z=0; z<MAP_H; z++) { setCell(0, z, 1); setCell(MAP_W-1, z, 1); }
    for (let x=0; x<MAP_W; x++) { setCell(x, 0, 1); setCell(x, MAP_H-1, 1); }
    // Улица: центральные 4 клетки свободны
    for (let z=2; z<MAP_H-2; z++) for (let x=1; x<MAP_W-1; x++) setCell(x, z, 0);
    // Дома вдоль улицы: стены слева (z=1) и справа (z=MAP_H-2)
    const houseStartX = 3, houseEndX = MAP_W-4;
    for (let x=houseStartX; x<=houseEndX; x++) {
      setCell(x, 1, 1);
      setCell(x, MAP_H-2, 1);
    }
    // Проёмы подъездов в домах: каждые 4 клетки
    for (let x=houseStartX+2; x<=houseEndX-2; x+=4) {
      setCell(x, 1, 2);
      setCell(x, MAP_H-2, 2);
    }
    // Окна на стенах (каждую клетку кроме дверей)
    for (let x=houseStartX; x<=houseEndX; x++) {
      if (map[1*MAP_W + x] === 1) setCell(x, 1, 3); // помечаем как окно для текстуры
      if (map[(MAP_H-2)*MAP_W + x] === 1) setCell(x, MAP_H-2, 3);
    }

    // Расстановка геометрии
    const wallGeo = new THREE.BoxGeometry(CELL, 3.0, CELL);
    const wallMatPanel = new THREE.MeshStandardMaterial({ map: panelTex, roughness: 0.8 });
    const wallMatBrick = new THREE.MeshStandardMaterial({ map: brickTex, roughness: 0.9 });
    const doorMat = new THREE.MeshStandardMaterial({ map: doorTex, roughness: 0.7 });
    const windowPaneMat = new THREE.MeshStandardMaterial({ map: windowTex, emissive: new THREE.Color(0x111122), roughness: 0.3 });

    // Пол (асфальт)
    const groundGeo = new THREE.PlaneGeometry(MAP_W * CELL, MAP_H * CELL);
    const ground = new THREE.Mesh(groundGeo, new THREE.MeshStandardMaterial({ map: asphaltTex, roughness: 0.9 }));
    ground.rotation.x = -Math.PI/2;
    ground.position.y = -0.01;
    ground.receiveShadow = true;
    scene.add(ground);

    // Создаём стены и декорации
    for (let z = 0; z < MAP_H; z++) {
      for (let x = 0; x < MAP_W; x++) {
        const cell = map[z*MAP_W + x];
        const worldX = x * CELL - MAP_W*CELL/2;
        const worldZ = z * CELL - MAP_H*CELL/2;
        if (cell === 1) { // стена
          const mat = Math.random() < 0.7 ? wallMatPanel : wallMatBrick;
          const wall = new THREE.Mesh(wallGeo, mat);
          wall.position.set(worldX, 1.5, worldZ);
          wall.castShadow = true; wall.receiveShadow = true;
          scene.add(wall);
        } else if (cell === 2) { // дверь подъезда
          const door = new THREE.Mesh(new THREE.BoxGeometry(CELL*0.6, 2.4, CELL*0.3), doorMat);
          door.position.set(worldX, 1.2, worldZ);
          door.castShadow = true; door.receiveShadow = true;
          scene.add(door);
        } else if (cell === 3) { // окно (декоративная панель)
          // заменяем обычную стену на стену с окном
          const frame = new THREE.Mesh(wallGeo, wallMatPanel);
          frame.position.set(worldX, 1.5, worldZ);
          frame.castShadow = true; frame.receiveShadow = true;
          scene.add(frame);
          // добавляем окно спереди
          const windowSize = 0.6;
          const windowPlane = new THREE.Mesh(new THREE.PlaneGeometry(windowSize, windowSize), windowPaneMat);
          windowPlane.position.set(worldX, 1.5, worldZ);
          // ориентируем окно на улицу
          if (z === 1) windowPlane.position.z += CELL/2 + 0.01;
          else windowPlane.position.z -= CELL/2 + 0.01;
          if (z === 1) windowPlane.rotation.y = 0;
          else windowPlane.rotation.y = Math.PI;
          scene.add(windowPlane);
        }
      }
    }

    // Добавим несколько ржавых гаражей во дворах (слева и справа от домов, за пределами улицы)
    const garageGeo = new THREE.BoxGeometry(CELL*1.5, 1.8, CELL*2);
    const garageMat = new THREE.MeshStandardMaterial({ map: rustTex, roughness: 0.6 });
    for (let side=0; side<2; side++) {
      const zPos = side===0 ? -1.5 : MAP_H*CELL/2 - 1.5;
      for (let x=houseStartX+1; x<=houseEndX-1; x+=6) {
        const garage = new THREE.Mesh(garageGeo, garageMat);
        garage.position.set(x*CELL - MAP_W*CELL/2, 0.9, zPos);
        garage.castShadow = true; garage.receiveShadow = true;
        scene.add(garage);
      }
    }

    // Фонарные столбы вдоль улицы
    const poleGeo = new THREE.CylinderGeometry(0.08, 0.1, 2.5, 8);
    const poleMat = new THREE.MeshStandardMaterial({ color: 0x333333 });
    const lampGeo = new THREE.SphereGeometry(0.25, 8, 8);
    const lampMat = new THREE.MeshStandardMaterial({ color: 0x888888, emissive: new THREE.Color(0x332211) });
    for (let x = houseStartX+1; x <= houseEndX-1; x += 5) {
      const pole = new THREE.Mesh(poleGeo, poleMat);
      pole.position.set(x*CELL - MAP_W*CELL/2, 1.25, 1.5*CELL); // у левого дома
      pole.castShadow = true; pole.receiveShadow = true;
      scene.add(pole);
      const lamp = new THREE.Mesh(lampGeo, lampMat);
      lamp.position.set(pole.position.x, 2.4, pole.position.z);
      lamp.castShadow = false;
      scene.add(lamp);
      // симметрично справа
      const pole2 = new THREE.Mesh(poleGeo, poleMat);
      pole2.position.set(x*CELL - MAP_W*CELL/2, 1.25, (MAP_H-2.5)*CELL);
      pole2.castShadow = true; pole2.receiveShadow = true;
      scene.add(pole2);
      const lamp2 = new THREE.Mesh(lampGeo, lampMat);
      lamp2.position.set(pole2.position.x, 2.4, pole2.position.z);
      scene.add(lamp2);
    }

    // ==================== ОСВЕЩЕНИЕ ====================
    const ambient = new THREE.AmbientLight(0x334455);
    scene.add(ambient);
    const dirLight = new THREE.DirectionalLight(0x667788, 0.5);
    dirLight.position.set(10, 20, 10);
    dirLight.castShadow = true;
    dirLight.shadow.mapSize.width = 1024;
    dirLight.shadow.mapSize.height = 1024;
    dirLight.shadow.camera.near = 1;
    dirLight.shadow.camera.far = 60;
    dirLight.shadow.camera.left = -20;
    dirLight.shadow.camera.right = 20;
    dirLight.shadow.camera.top = 20;
    dirLight.shadow.camera.bottom = -20;
    scene.add(dirLight);
    // фонарик игрока
    const flashlight = new THREE.SpotLight(0xccbb99, 1.5, 12, Math.PI/7, 0.1);
    flashlight.position.set(0,0,0);
    flashlight.target.position.set(0,0,-1);
    camera.add(flashlight);
    camera.add(flashlight.target);

    // ==================== ИГРОВАЯ ЛОГИКА ====================
    function worldToGrid(x, z) {
      const gx = Math.floor((x + MAP_W*CELL/2) / CELL);
      const gz = Math.floor((z + MAP_H*CELL/2) / CELL);
      return { x: gx, z: gz };
    }
    function isPassable(wx, wz) {
      const g = worldToGrid(wx, wz);
      if (g.x < 0 || g.x >= MAP_W || g.z < 0 || g.z >= MAP_H) return false;
      const cell = map[g.z * MAP_W + g.x];
      return cell === 0 || cell === 2; // пусто или дверь
    }

    let lastTime = performance.now();
    function animate() {
      const time = performance.now();
      const delta = Math.min(0.05, (time - lastTime) / 1000);
      lastTime = time;
      requestAnimationFrame(animate);

      if (controls.isLocked) {
        const speed = 3.2;
        const forward = new THREE.Vector3();
        camera.getWorldDirection(forward);
        forward.y = 0;
        forward.normalize();
        const right = new THREE.Vector3().crossVectors(forward, camera.up).normalize();
        const move = new THREE.Vector3(0,0,0);
        if (keyState.forward) move.add(forward);
        if (keyState.backward) move.sub(forward);
        if (keyState.right) move.add(right);
        if (keyState.left) move.sub(right);
        if (move.length() > 0) {
          move.normalize().multiplyScalar(speed * delta);
          const newPos = camera.position.clone().add(move);
          if (isPassable(newPos.x, newPos.z)) {
            camera.position.copy(newPos);
          }
        }
      }

      // фонарик
      flashlight.position.copy(camera.position);
      flashlight.target.position.copy(camera.position).add(new THREE.Vector3(0,0,-1).applyQuaternion(camera.quaternion));

      renderer.render(scene, camera);
    }

    // ==================== СОХРАНЕНИЕ ПОЗИЦИИ ====================
    window.addEventListener('beforeunload', () => {
      const pos = camera.position;
      localStorage.setItem('soviet_pos', JSON.stringify({ x: pos.x, y: pos.y, z: pos.z }));
    });
    // Восстановление
    const savedPos = localStorage.getItem('soviet_pos');
    if (savedPos) {
      try {
        const p = JSON.parse(savedPos);
        camera.position.set(p.x, p.y, p.z);
      } catch(e) {}
    }

    // ==================== ЗАПУСК ====================
    startWind();
    animate();

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
